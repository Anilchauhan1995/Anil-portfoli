<style type="text/css">
  .image {
    width: 200px;
    height: 200px;
    position: absolute;
    left: 50%;
    top: 50%;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    margin: -100px 0 0 -100px;
}
</style>
<body>
  <div class="loder">
  <div class="image" style=" background-image: url(img/source.gif);">&nbsp;</div>
<script type="text/javascript">
  $(window).on('load', function(){
  $('.loder').fadeOut(10000);
  $('.image').delay(3500).fadeOut('slow');
  $('body').delay(3500).css({'overflow':'visible'});
});
</script>
</body>
